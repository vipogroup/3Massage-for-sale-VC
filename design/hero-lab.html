<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VIPO — כורסת עיסוי VC LUXURY</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/hero-lab.css">
</head>
<body>

    <!-- Section 0 — Header -->
    <header class="vp-header">
        <div class="vp-side start">
            <a href="#order" class="vp-icon-btn" aria-label="וואטסאפ"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="vp-center">
            <a href="#" class="vp-logo"><span>VIPO</span><span>massage</span></a>
        </div>
        <div class="vp-side end">
            <button class="vp-icon-btn" aria-label="שתף"><i class="fas fa-share-alt"></i></button>
        </div>
    </header>

    <main>
        <!-- Section 1 — Hero -->
        <section class="vp-hero">
            <div class="vp-stage" id="vpStage">
                <img src="img/chair-cream-hires.png" alt="כורסת עיסוי VC" id="vpImg">
                <div class="vp-stage-bar">
                    <div class="vp-dots" id="vpDots"></div>
                    <div class="vp-swatches" id="vpSwatches"></div>
                </div>
            </div>
            <div class="vp-copy">
                <div class="vp-title-row">
                    <h1 class="vp-title">כורסת עיסוי<span>VC LUXURY</span></h1>
                    <span class="vp-tag">מפעל ישיר</span>
                </div>
                <div class="vp-pricing">
                    <span class="vp-price-now">₪2,900</span>
                    <span class="vp-price-was">₪12,000</span>
                    <span class="vp-badge-save">76% הנחה</span>
                </div>
                <p class="vp-price-note">מחיר לאחר הגעת המכולה: <strong>₪3,500</strong></p>
                <ul class="vp-trust">
                    <li><i class="fas fa-shield-alt"></i> אחריות יצרן</li>
                    <li><i class="fas fa-certificate"></i> תקן CE</li>
                    <li><i class="fas fa-truck-fast"></i> משלוח מהיר</li>
                </ul>
            </div>
        </section>

        <!-- Section 2 — מבצע + מלאי -->
        <section class="s2">
            <div class="s2-bg">

                <!-- כרטיס מבצע -->
                <div class="s2-card">
                    <div class="s2-card-head">
                        <i class="fas fa-clock"></i>
                        <span>המבצע נסגר בעוד</span>
                        <div class="s2-live"><span class="s2-pulse"></span>LIVE</div>
                    </div>

                    <div class="s2-timer">
                        <div class="s2-t">
                            <span id="s2h">11</span>
                            <small>שעות</small>
                        </div>
                        <span class="s2-t-sep">:</span>
                        <div class="s2-t">
                            <span id="s2m">47</span>
                            <small>דקות</small>
                        </div>
                        <span class="s2-t-sep">:</span>
                        <div class="s2-t">
                            <span id="s2s">32</span>
                            <small>שניות</small>
                        </div>
                    </div>

                    <div class="s2-stats">
                        <div class="s2-stat">
                            <span class="s2-stat-num">34</span>
                            <span class="s2-stat-lbl">רכישות</span>
                        </div>
                        <div class="s2-stat-div"></div>
                        <div class="s2-stat">
                            <span class="s2-stat-num">50</span>
                            <span class="s2-stat-lbl">במכולה</span>
                        </div>
                        <div class="s2-stat-div"></div>
                        <div class="s2-stat s2-stat-alert">
                            <span class="s2-stat-num">16</span>
                            <span class="s2-stat-lbl">נותרו</span>
                        </div>
                    </div>

                    <div class="s2-progress">
                        <div class="s2-progress-bar"><div class="s2-progress-fill" style="width:68%"></div></div>
                    </div>
                </div>

                <!-- סרטון -->
                <p class="s2-vid-label"><i class="fas fa-play-circle"></i> סרטון הדגמה</p>
                <a href="#" class="s2-vid-thumb">
                    <img src="img/chair-cream-hires.png" alt="סרטון הדגמה">
                    <div class="s2-vid-overlay">
                        <i class="fas fa-play"></i>
                    </div>
                    <span class="s2-vid-dur">2:14</span>
                </a>

            </div>
        </section>
    </main>

    <!-- כפתור צף -->
    <div class="vp-sticky">
        <div class="vp-sticky-inner">
            <div class="vp-sticky-price">
                <span class="vp-sticky-now">₪2,900</span>
                <span class="vp-sticky-was">₪12,000</span>
            </div>
            <a href="#order" class="vp-sticky-btn"><i class="fab fa-whatsapp"></i> הזמינו עכשיו</a>
        </div>
    </div>

    <script>
    (function () {
        var slides = [
            { img: 'img/chair-cream-hires.png', hex: '#efe9df', label: 'שמנת' },
            { img: 'img/chair-gray-hires.png',  hex: '#7d7d80', label: 'אפור' },
            { img: 'img/chair-black-hires.png', hex: '#1c1c1e', label: 'שחור' }
        ];
        var ROTATE_MS = 2000, RESUME_MS = 120000;
        var idx = 0, locked = false, timer = null, resumeTimer = null;
        var imgEl = document.getElementById('vpImg');
        var dotsEl = document.getElementById('vpDots');
        var swEl  = document.getElementById('vpSwatches');

        slides.forEach(function (s, i) {
            var dot = document.createElement('button');
            dot.className = 'vp-dot';
            dot.setAttribute('aria-label', s.label);
            dot.addEventListener('click', function () { lockTo(i); });
            dotsEl.appendChild(dot);

            var sw = document.createElement('button');
            sw.className = 'vp-swatch';
            sw.style.background = s.hex;
            sw.setAttribute('title', s.label);
            sw.addEventListener('click', function () { lockTo(i); });
            swEl.appendChild(sw);
        });

        function go(i) {
            idx = (i + slides.length) % slides.length;
            imgEl.classList.add('vp-out');
            setTimeout(function () { imgEl.src = slides[idx].img; imgEl.classList.remove('vp-out'); }, 220);
            Array.prototype.forEach.call(dotsEl.children, function (d, di) { d.classList.toggle('is-on', di === idx); });
            Array.prototype.forEach.call(swEl.children,  function (s, si) { s.classList.toggle('is-on', si === idx); });
        }

        function lockTo(i) {
            locked = true;
            clearInterval(timer); timer = null;
            clearTimeout(resumeTimer);
            go(i);
            if (RESUME_MS > 0) resumeTimer = setTimeout(function () { locked = false; startAuto(); }, RESUME_MS);
        }

        function startAuto() {
            clearInterval(timer);
            timer = setInterval(function () { if (!locked) go(idx + 1); }, ROTATE_MS);
        }

        go(0); startAuto();

        var end = Date.now() + (11 * 3600 + 47 * 60 + 32) * 1000;
        function pad(n) { return String(n).padStart(2,'0'); }
        function tick() {
            var d = Math.max(0, Math.floor((end - Date.now()) / 1000));
            document.getElementById('s2h').textContent = pad(Math.floor(d/3600));
            document.getElementById('s2m').textContent = pad(Math.floor((d%3600)/60));
            document.getElementById('s2s').textContent = pad(d%60);
        }
        tick(); setInterval(tick, 1000);
    })();
    </script>
</body>
</html>
